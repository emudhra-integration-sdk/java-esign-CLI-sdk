name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish (e.g. v1.0.0). Defaults to v<version.txt> if blank.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Compile via the project's Ant build (honors the relative lib/ classpath
      # in nbproject/project.properties -> output in build/classes).
      - name: Compile with Ant
        run: ant clean compile

      # Assemble a self-contained distribution: the runnable jar plus its
      # dependencies under dist/lib/. The jar's Class-Path manifest points at
      # lib/, so the jar + lib/ together run with `java -jar`.
      - name: Assemble distribution
        run: |
          set -euo pipefail
          mkdir -p dist/lib
          cp lib/*.jar dist/lib/
          CLASS_PATH="$(for j in lib/*.jar; do printf 'lib/%s ' "$(basename "$j")"; done)"
          mkdir -p build
          {
            echo "Manifest-Version: 1.0"
            echo "Main-Class: esignasplibrarycli.ESignASPLibraryCLI"
            echo "Class-Path: ${CLASS_PATH}"
          } > build/release-manifest.txt
          jar cfm dist/eSignASPLibraryCLI.jar build/release-manifest.txt -C build/classes .
          echo "---- dist ----" && ls -la dist dist/lib

      - name: Smoke test (help output)
        run: java -jar dist/eSignASPLibraryCLI.jar | tee /dev/stderr | grep -q "eSign ASP library CLI help"

      - name: Upload build as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: eSignASPLibraryCLI
          path: |
            dist/eSignASPLibraryCLI.jar
            dist/lib/
          retention-days: 90

      # ---- Release: on every push to main, on version tags, and on manual dispatch ----
      # (Pull requests build + upload artifacts only; they do not publish a release.)

      - name: Determine release version
        if: github.event_name != 'pull_request'
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(tr -d '[:space:]' < version.txt)"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Build release notes (latest CHANGELOG section)
        if: github.event_name != 'pull_request'
        run: |
          # Print the first '## [...]' section of the changelog (up to the next one).
          awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "_Built from \`${GITHUB_SHA::7}\`. The CLI and bundled dependencies are provided \"AS IS\" — see [NOTICE](NOTICE) and the README's Important Notice._" >> RELEASE_NOTES.md
          echo "----- release notes -----" && cat RELEASE_NOTES.md

      - name: Package CLI + dependencies bundle
        if: github.event_name != 'pull_request'
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          (cd dist && zip -r "../eSignASPLibraryCLI-${VERSION}.zip" eSignASPLibraryCLI.jar lib)
          ls -la "eSignASPLibraryCLI-${VERSION}.zip"

      - name: Publish to GitHub Releases
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: eSign CLI Kit ${{ steps.version.outputs.value }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/eSignASPLibraryCLI.jar
            dist/lib/*.jar
            eSignASPLibraryCLI-${{ steps.version.outputs.value }}.zip
